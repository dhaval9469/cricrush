name: cricrush
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_storage: ^2.1.1
  google_fonts: ^6.3.2
  encrypt: ^5.0.3
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  http: ^1.6.0
  font_awesome_flutter: ^10.12.0
  web_socket_channel: ^3.0.3
  skeletonizer: ^2.1.3
  share_plus: ^12.0.1
  flutter_html: ^3.0.0-beta.2
  pull_to_refresh_flutter3: ^2.0.2
  flutter_tts: ^4.2.5
  iconsax_flutter: ^1.0.1
  flutter_svg: ^2.2.4
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.23.5
  flutter_rating_bar: ^4.0.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  firebase_analytics: ^12.1.2
  firebase_remote_config: ^6.1.4
  firebase_core: ^4.4.0
  google_mobile_ads: ^7.0.0
  gma_mediation_meta: ^1.5.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0
  permission_handler: ^12.0.1
  in_app_review: ^2.0.11
  in_app_update: ^4.2.5
  visibility_detector: ^0.4.0+2
  flutter_fgbg: ^0.7.1
  firebase_crashlytics:






dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/


  fonts:
    - family: Barlow
      fonts:
        - asset: assets/font/Barlow-Bold.ttf
        - asset: assets/font/Barlow-Regular.ttf
    - family: DMSans
      fonts:
        - asset: assets/font/DMSans-Regular.ttf

